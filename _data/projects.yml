- name: The Bricks
  folder: thebricks
  url: https://www.thebricks.com/
  role: AI / Frontend Developer
  description: >
    Bricks is the project I've been working on for the last 4 years. It started
    as a lightweight fast multi-user web spreadsheet, but soon became an AI-powered
    tool for generating dashboards. I designed LLM pipelines that clean up, organize
    and analyze user data, build a plan for the AI agents and generate beautiful dashboards
    with interactive insights, charts, and tables. Everything can be controlled and
    tuned by simply prompting AI, and all data is automatically updated from connected sources.
  youtube:
    - url: https://youtu.be/bIUfB1MK-jQ
      caption: Product demo
  tags:
    - TypeScript
    - SolidJS
    - LLM
    - WebAssembly

- name: DCS World
  folder: dcs
  url: https://www.digitalcombatsimulator.com/en/
  role: 3D Graphics Developer
  description: >
    At Eagle Dynamics I worked as a rendering engineer responsible for porting the game engine from DirectX11
    to Vulkan API. I implemented the new rendering backend with render graph architecture on top,
    optimized engine performance and set up a pipeline for cross-compiling FX shaders to SPIR-V.
  youtube:
    - url: https://youtu.be/LikrhlACyiI
      caption: Game trailer
  tags:
    - C++
    - Vulkan
    - SPIR-V

- name: MxEngine
  folder: mxengine
  url: https://github.com/asc-community/MxEngine
  role: Author
  stars: "1.2K+"
  description: >
    MxEngine is one of the biggest open-source projects I did in my free time. It's a 3D
    game engine with all the core features: dynamic lighting and shadows, PBR
    rendering pipeline, asset manager, runtime scene editing and script compilation,
    Entity Component System, physics and sounds — written fully in C++ with modern OpenGL.
  tags:
    - C++
    - OpenGL
    - GLSL
    - PBR
    - ECS

- name: Voxellaneous
  folder: voxellaneous
  url: https://github.com/voxellaneous/voxellaneous
  role: Author
  wip: true
  description: >
    Voxellaneous is a side project I am currently working on — a voxel engine written fully in TypeScript with WebGPU. 
    The goal is to create a highly modular and extensible engine running fully in the browser, with ability to connect
    with other players and share voxel worlds. I am also treating this project as a playground for LLM experiments -
    the code is generated fully by Claude Code, and engine modding API will be designed around prompting AI to generate new features and content.
  tags:
    - TypeScript
    - WebGPU
    - WGSL
