<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>

  <body>
    <nav class="nav">
      <div class="nav-inner">
        <div class="nav-links">
          <a href="#about">About</a>
          <a href="#experience">Experience</a>
          <a href="#projects">Projects</a>
          <a href="#education">Education</a>
          <a href="#contact">Contact</a>
        </div>
      </div>
    </nav>

    <main>
      {{ content }}
    </main>

    <!-- Lightbox -->
    <div class="lightbox-overlay" id="lightbox">
      <button class="lightbox-close" aria-label="Close">&times;</button>
      <button class="lightbox-nav lightbox-prev" aria-label="Previous">&#8249;</button>
      <button class="lightbox-nav lightbox-next" aria-label="Next">&#8250;</button>
      <div class="lightbox-content" id="lightbox-content"></div>
    </div>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-inner">
          <p>&copy; {{ 'now' | date: '%Y' }} Aleksandr Potapov</p>
          <div class="footer-links">
            <a href="https://github.com/MomoDeve" target="_blank" rel="noopener">GitHub</a>
            <a href="https://linkedin.com/in/alexander-potapov" target="_blank" rel="noopener">LinkedIn</a>
            <a href="mailto:alexander.potapov.w@gmail.com">Email</a>
          </div>
        </div>
      </div>
    </footer>
    <script>
      if (window.innerWidth <= 640) {
        document.querySelectorAll('.timeline-collapse').forEach(function(d) {
          d.removeAttribute('open');
        });
      }
      // ── Lightbox ──
      (function() {
        var overlay = document.getElementById('lightbox');
        var content = document.getElementById('lightbox-content');
        var items = [];   // { src, type, caption }
        var current = 0;

        function collectItems(card) {
          items = [];
          card.querySelectorAll('.gallery-thumb').forEach(function(thumb) {
            var vid = thumb.querySelector('video');
            var img = thumb.querySelector('img');
            var cap = thumb.querySelector('.gallery-caption');
            var ytId = thumb.getAttribute('data-youtube');
            if (ytId) {
              items.push({ src: ytId, type: 'youtube', caption: cap ? cap.textContent : '' });
            } else if (vid) {
              items.push({ src: vid.src, type: 'video', caption: cap ? cap.textContent : '' });
            } else if (img) {
              items.push({ src: img.src, type: 'image', caption: cap ? cap.textContent : '' });
            }
          });
        }

        function show(index) {
          current = index;
          var item = items[current];
          var html = '';
          if (item.type === 'youtube') {
            html = '<iframe src="https://www.youtube.com/embed/' + item.src + '?autoplay=1" style="width:min(90vw,960px);height:min(85vh,540px);border-radius:6px" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen></iframe>';
          } else if (item.type === 'video') {
            html = '<video src="' + item.src + '" controls autoplay loop style="max-width:90vw;max-height:85vh;border-radius:6px"></video>';
          } else {
            html = '<img src="' + item.src + '" alt="' + item.caption + '" />';
          }
          if (item.caption) {
            html += '<div class="lightbox-caption">' + item.caption + '</div>';
          }
          content.innerHTML = html;
          overlay.classList.add('is-active');
          document.body.style.overflow = 'hidden';
        }

        function close() {
          overlay.classList.remove('is-active');
          document.body.style.overflow = '';
          var v = content.querySelector('video');
          if (v) v.pause();
          var iframe = content.querySelector('iframe');
          if (iframe) iframe.src = '';
          content.innerHTML = '';
        }

        document.querySelectorAll('.gallery-thumb').forEach(function(thumb) {
          // Hover‑play for video thumbnails
          var vid = thumb.querySelector('video');
          if (vid) {
            thumb.addEventListener('mouseenter', function() { vid.play(); });
            thumb.addEventListener('mouseleave', function() { vid.pause(); vid.currentTime = 0; });
          }

          thumb.addEventListener('click', function() {
            var card = thumb.closest('.project-card');
            collectItems(card);
            var idx = parseInt(thumb.getAttribute('data-index'), 10);
            show(idx);
          });
        });

        overlay.querySelector('.lightbox-close').addEventListener('click', close);
        overlay.querySelector('.lightbox-prev').addEventListener('click', function() {
          if (items.length > 1) show((current - 1 + items.length) % items.length);
        });
        overlay.querySelector('.lightbox-next').addEventListener('click', function() {
          if (items.length > 1) show((current + 1) % items.length);
        });

        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) close();
        });

        document.addEventListener('keydown', function(e) {
          if (!overlay.classList.contains('is-active')) return;
          if (e.key === 'Escape') close();
          if (e.key === 'ArrowLeft') overlay.querySelector('.lightbox-prev').click();
          if (e.key === 'ArrowRight') overlay.querySelector('.lightbox-next').click();
        });
      })();

      document.querySelectorAll('.copy-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          navigator.clipboard.writeText(btn.dataset.copy).then(function() {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() {
              btn.textContent = 'Copy';
              btn.classList.remove('copied');
            }, 1500);
          });
        });
      });
    </script>
  </body>
</html>
