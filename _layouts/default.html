<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>

  <body>
    <nav class="nav">
      <div class="nav-inner">
        <div class="nav-links">
          <a href="#about">About</a>
          <a href="#experience">Experience</a>
          <a href="#projects">Projects</a>
          <a href="#education">Education</a>
          <a href="#contact">Contact</a>
        </div>
      </div>
    </nav>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-inner">
          <p>&copy; {{ 'now' | date: '%Y' }} Aleksandr Potapov</p>
          <div class="footer-links">
            <a href="https://github.com/MomoDeve" target="_blank" rel="noopener">GitHub</a>
            <a href="https://linkedin.com/in/alexander-potapov" target="_blank" rel="noopener">LinkedIn</a>
            <a href="mailto:alexander.potapov.w@gmail.com">Email</a>
          </div>
        </div>
      </div>
    </footer>
    <script>
      if (window.innerWidth <= 640) {
        document.querySelectorAll('.timeline-collapse').forEach(function(d) {
          d.removeAttribute('open');
        });
      }
      document.querySelectorAll('.copy-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          navigator.clipboard.writeText(btn.dataset.copy).then(function() {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() {
              btn.textContent = 'Copy';
              btn.classList.remove('copied');
            }, 1500);
          });
        });
      });
    </script>
  </body>
</html>
